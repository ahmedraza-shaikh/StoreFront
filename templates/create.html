{% extends 'base.html' %}

{% block content %}

<h1>Login</h1>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.email.label }}<br>
        {{ form.email() }}
    </p>

    <p>
        {{ form.password.label }}<br>
        {{ form.password() }}
    </p>

    <p>
        {{ form.remember() }}
        {{ form.remember.label }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

<p>
    <a href="{{ url_for('reset_request') }}">
        Forgot Password?
    </a>
</p>

{% endblock %}
