{% extends 'base.html' %}

{% block content %}

<h1>Admin Products</h1>

<a href="{{ url_for('admin.new_product') }}">
    Add New Product
</a>

<hr>

{% for product in products %}

<div class="product-card">

    <h3>{{ product.name }}</h3>

    <p>{{ product.price | currency }}</p>

    <p>{{ product.category }}</p>

    <a href="{{ url_for('admin.edit_product', id=product.id) }}">
        Edit
    </a>

    <form method="POST"
          action="{{ url_for('admin.delete_product', id=product.id) }}">

        <button type="submit">
            Delete
        </button>

    </form>

</div>

{% endfor %}

{% endblock %}
