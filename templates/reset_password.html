{% extends 'base.html' %}

{% block content %}

<h1>Set New Password</h1>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.password.label }}<br>
        {{ form.password() }}
    </p>

    <p>
        {{ form.confirm_password.label }}<br>
        {{ form.confirm_password() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

{% endblock %}
